<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Dúvidas frequentes sobre o casamento.">
    <meta name="theme-color" content="#1a1714">
    <title>Dúvidas Frequentes</title>
    <script>
        (function () {
            // Carrega cores do tema antecipadamente para a loading screen
            // Sem bloquear o bootstrap principal
            async function applyLoadingScreenColors() {
                try {
                    // 1. Carrega site.json para descobrir qual tema usar
                    const siteRes = await fetch('assets/config/site.json');
                    if (!siteRes.ok) return;
                    const siteConfig = await siteRes.json();

                    // 2. Descobre o caminho do tema
                    let themePath = siteConfig.activeTheme;
                    if (!themePath) {
                        themePath = 'assets/layouts/classic/themes/classic-silver-light.json';
                    }

                    // 3. Carrega o arquivo de tema
                    const themeRes = await fetch(themePath);
                    if (!themeRes.ok) {
                        // Fallback para cores padrão se tema falhar
                        applyDefaultLoadingColors();
                        return;
                    }
                    const theme = await themeRes.json();

                    // 4. Extrai cores do tema
                    const bgColor = theme?.colors?.background || '#ffffff';
                    const primaryColor = theme?.colors?.primary || '#d4a574';

                    // 5. Aplica as cores na loading screen
                    const root = document.documentElement;
                    root.style.setProperty('--ls-bg-color', bgColor);
                    root.style.setProperty('--ls-primary-color', primaryColor);
                } catch (error) {
                    // Em caso de erro, usa cores padrão
                    applyDefaultLoadingColors();
                }
            }

            function applyDefaultLoadingColors() {
                const root = document.documentElement;
                root.style.setProperty('--ls-bg-color', '#ffffff');
                root.style.setProperty('--ls-primary-color', '#d4a574');
            }

            // Inicializa cores padrão
            applyDefaultLoadingColors();
            // Carrega cores do tema em background (não bloqueia)
            applyLoadingScreenColors();
        })();
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body class="extra-page faq-page">

    <div class="loading-screen" id="loadingScreen" aria-hidden="true">
        <div class="loading-backdrop"></div>
        <div class="loading-content">
            <div class="loading-hearts">
                <span class="heart heart-1">💕</span>
                <span class="heart heart-2">💕</span>
                <span class="heart heart-3">💕</span>
            </div>
            <p class="loading-text">Carregando seu convite</p>
        </div>
    </div>

    <main class="extra-main">
        <section class="content-section extra-intro">
            <span class="section-tag reveal" id="faqTag">FAQ</span>
            <h1 class="section-title reveal" id="faqTitle">Tudo que você precisa saber</h1>
            <p class="section-body reveal" id="faqIntro"></p>
        </section>

        <div class="divider reveal" aria-hidden="true">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <div class="extra-content">
            <div class="faq-list reveal" id="faqList"></div>
        </div>

        <div class="gift-back-wrap">
            <a class="gift-back-link" id="backToExtrasButton" href="index.html?section=extras" aria-label="Voltar para opções extras"></a>
        </div>
    </main>

    <footer>
        <div class="footer-names" id="mainFooterNames">Siannah & Diego</div>
        <p class="footer-note" id="mainFooterNote">06 . 09 . 2026 | São Bernardo do Campo</p>
    </footer>

    <script type="module" src="assets/js/script.js"></script>
    <script type="module" src="assets/js/faq.js"></script>
</body>
</html>
