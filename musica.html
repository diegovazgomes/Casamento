<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Sugira uma música para a festa de casamento.">
    <meta name="theme-color" content="#1a1714">
    <title>Sugerir Música</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <script>
        /* Loading Screen — leitura síncrona para zero flash de iniciais/tema */
        (function () {
            try {
                var c = JSON.parse(sessionStorage.getItem('ls-theme-colors') || 'null');
                if (c && c.bg && c.text && c.primary) {
                    var r = document.documentElement;
                    r.style.setProperty('--ls-bg-color',      c.bg);
                    r.style.setProperty('--ls-text-color',    c.text);
                    r.style.setProperty('--ls-primary-color', c.primary);
                }
                window.__LS_COUPLE_DATA__ = null;
                if (sessionStorage.getItem('ls_data_ready') === '1') {
                    var d = JSON.parse(sessionStorage.getItem('ls_couple') || 'null');
                    if (d && d.first && d.second) { window.__LS_COUPLE_DATA__ = d; }
                }
            } catch (e) { window.__LS_COUPLE_DATA__ = null; }
        })();
    </script>
    <script type="module">
        import { initLoadingScreen } from './assets/js/loading-screen.js';
        initLoadingScreen();
    </script>
</head>
<body class="extra-page musica-page">

    <main class="extra-main">
        <section class="content-section extra-intro">
            <span class="section-tag reveal" id="musicaTag">Sugestão de Música</span>
            <h1 class="section-title reveal" id="musicaTitle">Qual música não pode faltar?</h1>
            <p class="section-body reveal" id="musicaIntro"></p>
        </section>

        <div class="divider reveal" aria-hidden="true">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <div class="extra-content">
            <section class="extra-form-card reveal" aria-labelledby="musicaFormTitle">
                <h2 class="extra-form-title" id="musicaFormTitle">Envie sua sugestão</h2>
                <p class="extra-form-subtitle" id="musicaFormSubtitle"></p>

                <form class="extra-form" id="musicaForm" novalidate>
                    <div class="extra-form-field">
                        <label class="extra-form-label" id="musicaNameLabel" for="musicaNameInput">Seu nome (opcional)</label>
                        <input
                            class="rsvp-input"
                            id="musicaNameInput"
                            name="guestName"
                            type="text"
                            maxlength="80"
                            autocomplete="name"
                            placeholder="Como podemos te chamar?">
                    </div>

                    <div class="extra-form-field">
                        <label class="extra-form-label" id="musicaSongLabel" for="musicaSongInput">Nome da música</label>
                        <input
                            class="rsvp-input"
                            id="musicaSongInput"
                            name="songTitle"
                            type="text"
                            maxlength="120"
                            required
                            aria-required="true"
                            placeholder="Ex: Velha Infância">
                    </div>

                    <div class="extra-form-field">
                        <label class="extra-form-label" id="musicaArtistLabel" for="musicaArtistInput">Artista (opcional)</label>
                        <input
                            class="rsvp-input"
                            id="musicaArtistInput"
                            name="songArtist"
                            type="text"
                            maxlength="120"
                            placeholder="Ex: Tribalistas">
                    </div>

                    <div class="extra-form-field">
                        <label class="extra-form-label" id="musicaNotesLabel" for="musicaNotesInput">Observações (opcional)</label>
                        <textarea
                            class="rsvp-input extra-form-textarea"
                            id="musicaNotesInput"
                            name="songNotes"
                            rows="4"
                            maxlength="500"
                            placeholder="Diga por que essa música é especial..."></textarea>
                    </div>

                    <button class="rsvp-submit" id="musicaSubmitButton" type="submit">Enviar sugestão aos noivos</button>
                    <p class="extra-form-feedback" id="musicaFeedback" role="status" aria-live="polite"></p>
                </form>
            </section>
        </div>

        <div class="gift-back-wrap">
            <a class="gift-back-link" id="backToExtrasButton" href="index.html?section=extras" aria-label="Voltar para opções extras"></a>
        </div>
    </main>

    <footer>
        <div class="footer-names" id="mainFooterNames"></div>
        <p class="footer-note" id="mainFooterNote">06 . 09 . 2026 | São Bernardo do Campo</p>
    </footer>

    <script type="module" src="assets/js/script.js"></script>
    <script type="module" src="assets/js/musica.js"></script>
</body>
</html>
